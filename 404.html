<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Times New Roman", Georgia, serif;
            background-color: #f9f9f9;
            color: #222;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            max-width: 600px;
            padding: 30px;
            border: 1px solid #ccc;
            background: #fff;
        }

        h1 {
            font-size: 64px;
            margin: 0;
            letter-spacing: 2px;
        }

        h2 {
            font-weight: normal;
            margin-top: 10px;
        }

        p {
            margin: 20px 0;
            line-height: 1.6;
        }

        .note {
            font-style: italic;
            font-size: 14px;
            color: #555;
        }

        a {
            display: inline-block;
            margin-top: 15px;
            text-decoration: none;
            color: #000;
            border: 1px solid #000;
            padding: 8px 16px;
        }

        a:hover {
            background-color: #000;
            color: #fff;
        }

        footer {
            margin-top: 20px;
            font-size: 12px;
            color: #777;
            text-align: center;
        }

        footer a {
            color: #000;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>

        <p>
            The requested page could not be located. It may have been removed,
            renamed, or is temporarily unavailable.
        </p>

        <p class="note">
            “Matter stands dismissed due to absence of record.”
        </p>

        <a href="/">Return to Homepage</a>
    </div>

    <footer>
        <p>
            © 2026 Rajeev Kumar Goel. DNS powered by 
            <a href="https://www.tencentcloud.com" target="_blank" rel="noopener noreferrer">
                Tencent Cloud
            </a>
        </p>
    </footer>
</body>
</html>
